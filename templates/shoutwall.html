{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{title}}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" type="image/x-icon" href="https://www.wina.be/static/favicon.ico">
    {% tailwind_css %}
</head>

<body class="bg-white text-wina-dark m-0 p-0 flex flex-col min-h-screen">
    
    <div style="display: none;">{% csrf_token %}</div>

    <header class="sticky bg-white text-wina-dark top-0 z-50 shadow-xl py-3 px-4 sm:px-0">
        <div class="container mx-auto max-w-screen-xl justify-center">
            <a href="https://www.wina.be/" class="absolute py-1">
                <img src="https://www.wina.be/static/img/brand/schild_transparent.png" alt="Wina Shield" class="h-[5rem] md:h-[10rem] w-auto align-middle py-0">
            </a>
            <h1 href="/" class="text-3xl font-bold justify-center text-center py-2 underline decoration-[#42b4eb] decoration-2 underline-offset-12">
                {{title|upper}}
            </h1>
        </div>
    </header>

    <main class="container mx-auto max-w-screen-xl my-12 px-4 sm:px-0 flex-grow content-center">
        <div class="h-fit w-full">
            
            <h2 id="pauze-subtitle" 
                contenteditable="true" 
                class="text-3xl font-semibold text-center py-5 focus:outline-none"
            >{{subtitle}}</h2>
            
            <div id="pauze-content" 
                 contenteditable="true" 
                 class="mx-auto max-w-screen-lg text-justify pb-10 focus:outline-none w-fit px-10"
            >{{content|safe}}</div>

        </div>
    </main>

    <footer class="sticky bottom-0 z-50 bg-wina-footer text-white py-8  shadow-[0_-20px_25px_-5px_rgba(0,0,0,0.1),0_-8px_10px_-6px_rgba(0,0,0,0.1)] w-full">
        <div class="container mx-auto max-w-screen-xl px-4 sm:px-0">
            <div id="pauze-last-edited" class="ml-auto w-fit">Last edited at {{time_formatted}}</div>
        </div>
    </footer>

    <script>
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        let currentLastEdited = "{{ time_formatted|escapejs }}";
        let saveTimeout = null;
        let inactivityTimeout = null;

        const INACTIVITY_LIMIT = 5000; 

        const subtitleEl = document.getElementById('pauze-subtitle');
        const contentEl = document.getElementById('pauze-content');

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            
            const activeId = document.activeElement.id;
            if (activeId === 'pauze-subtitle' || activeId === 'pauze-content') {
                inactivityTimeout = setTimeout(() => {
                    document.activeElement.blur();
                }, INACTIVITY_LIMIT);
            }
        }

        function saveChanges() {
            const newSubtitle = subtitleEl.innerText;
            const newContent = contentEl.innerHTML;

            fetch('{% url "pauze:api" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ subtitle: newSubtitle, content: newContent })
            })
            .then(res => res.json())
            .then(data => {
                currentLastEdited = data.time_formatted;
                document.getElementById('pauze-last-edited').innerText = `Last edited at ${data.time_formatted}`;
            });
        }

        function handleUserTyping() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveChanges, 1000); 
            resetInactivityTimer();
        }

        subtitleEl.addEventListener('input', handleUserTyping);
        contentEl.addEventListener('input', handleUserTyping);

        subtitleEl.addEventListener('focus', resetInactivityTimer);
        contentEl.addEventListener('focus', resetInactivityTimer);

        subtitleEl.addEventListener('blur', () => clearTimeout(inactivityTimeout));
        contentEl.addEventListener('blur', () => clearTimeout(inactivityTimeout));


        function pollForUpdates() {
            const activeId = document.activeElement.id;
            if (activeId === 'pauze-subtitle' || activeId === 'pauze-content') {
                return;
            }
            fetch('{% url "pauze:api" %}')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('pauze-subtitle').innerText = data.subtitle;
                    document.getElementById('pauze-content').innerHTML = data.content;
                    document.getElementById('pauze-last-edited').innerText = `Last edited at ${data.time_formatted}`;
                    currentLastEdited = data.time_formatted;
                })
                .catch(err => console.error(err));
        }

        setInterval(pollForUpdates, 1000);
    </script>
</body>
</html>
